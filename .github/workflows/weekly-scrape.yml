name: Weekly scrape + retrain

on:
  schedule:
    # Every Sunday at 02:00 UTC (slow hours for AutoScout24)
    - cron: '0 2 * * 0'
  # Also allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  scrape:
    strategy:
      fail-fast: false
      matrix:
        country: [NL, DE, BE]
    runs-on: ubuntu-latest
    # Each country gets its own 6h budget (GH Actions free tier per-job cap)
    timeout-minutes: 350

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape ${{ matrix.country }}
        run: python main.py --scrape --countries ${{ matrix.country }}
        env:
          DB_PATH: ./cars.db

      - name: Upload DB shard
        uses: actions/upload-artifact@v4
        with:
          name: cars-${{ matrix.country }}
          path: cars.db
          retention-days: 1

  train-deploy:
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all DB shards
        uses: actions/download-artifact@v4
        with:
          path: shards/
          pattern: cars-*

      - name: Merge shards into cars.db
        run: |
          rm -f cars.db
          FIRST=$(ls shards/cars-*/cars.db | head -1)
          cp "$FIRST" cars.db
          for shard in shards/cars-*/cars.db; do
            if [ "$shard" = "$FIRST" ]; then continue; fi
            sqlite3 cars.db "ATTACH DATABASE '$shard' AS s; INSERT OR REPLACE INTO listings SELECT * FROM s.listings; DETACH DATABASE s;"
          done
          echo "Merged total: $(sqlite3 cars.db 'SELECT COUNT(*) FROM listings;') listings"

      - name: Retrain model
        run: python train.py
        env:
          DB_PATH: ./cars.db

      - name: Upload pipeline.joblib to Railway
        run: |
          curl -fsS -X POST "${{ secrets.API_URL }}/upload/pipeline.joblib" \
            -H "Authorization: Bearer ${{ secrets.UPLOAD_SECRET }}" \
            -F "file=@pipeline.joblib"

      - name: Upload cars.db to Railway
        run: |
          curl -fsS -X POST "${{ secrets.API_URL }}/upload/cars.db" \
            -H "Authorization: Bearer ${{ secrets.UPLOAD_SECRET }}" \
            -F "file=@cars.db"

      - name: Upload range_lookup.json to Railway
        run: |
          curl -fsS -X POST "${{ secrets.API_URL }}/upload/range_lookup.json" \
            -H "Authorization: Bearer ${{ secrets.UPLOAD_SECRET }}" \
            -F "file=@range_lookup.json"

      - name: Summary
        run: |
          echo "### Weekly scrape + retrain complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f train_results.json ]; then
            echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
            cat train_results.json >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
